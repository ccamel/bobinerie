name: Publish Skill to ClawHub

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Release tag to publish, for example skills/bobine-contract-caller/v0.1.0
        required: true
        type: string
  push:
    tags:
      - "skills/*/v*"

permissions:
  contents: read

concurrency:
  group: publish-clawhub-skill-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
      INPUT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ env.INPUT_REF }}
          fetch-depth: 0

      - name: Verify tag and resolve publish metadata
        id: publish
        shell: bash
        run: |
          set -euo pipefail

          raw_ref="${INPUT_REF}"

          if [[ "${raw_ref}" =~ ^refs/tags/ ]]; then
            tag="${raw_ref#refs/tags/}"
          else
            tag="${raw_ref}"
          fi

          if [[ ! "${tag}" =~ ^skills/([^/]+)/v(.+)$ ]]; then
            echo "Ref '${raw_ref}' must be a release tag in the form skills/<slug>/v<version>" >&2
            exit 1
          fi

          skill="${BASH_REMATCH[1]}"
          version="${BASH_REMATCH[2]}"
          skill_path="skills/${skill}"
          skill_file="${skill_path}/SKILL.md"

          test -n "${skill}"
          test -d "${skill_path}"
          test -f "${skill_file}"

          resolved_version="$(node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs"

          const tagRef = process.env.INPUT_REF ?? ""
          const tag = tagRef.startsWith("refs/tags/") ? tagRef.slice("refs/tags/".length) : tagRef
          const match = tag.match(/^skills\/([^/]+)\/v(.+)$/)

          if (match == null || match[1] == null) {
            throw new Error(`Ref '${tagRef}' must be a release tag in the form skills/<slug>/v<version>`)
          }

          const path = `skills/${match[1]}/SKILL.md`
          const content = readFileSync(path, "utf-8")
          const frontmatterMatch = content.match(/^---\r?\n([\s\S]*?)\r?\n---/)

          if (frontmatterMatch == null) {
            throw new Error(`No frontmatter found in ${path}`)
          }

          const versionMatch = frontmatterMatch[1].match(
            /^metadata:\s*\n(?:\s+\S+:.*\n)*?\s+version:\s*(.+)$/m,
          )

          if (versionMatch == null || versionMatch[1] == null) {
            throw new Error(`No metadata.version field found in ${path}`)
          }

          process.stdout.write(versionMatch[1].trim())
          NODE
          )"

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?([+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version '${version}' is not a valid semver value" >&2
            exit 1
          fi

          if [[ "${version}" != "${resolved_version}" ]]; then
            echo "Tag version ${version} does not match ${skill_file} metadata.version (${resolved_version})" >&2
            exit 1
          fi

          if [[ "${version}" == *"-"* ]]; then
            clawhub_tags="beta"
          else
            clawhub_tags="latest"
          fi

          {
            echo "skill=${skill}"
            echo "skill_path=${skill_path}"
            echo "skill_file=${skill_file}"
            echo "tag=${tag}"
            echo "version=${version}"
            echo "clawhub_tags=${clawhub_tags}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify token is configured
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${CLAWHUB_TOKEN}" ]]; then
            echo "Missing CLAWHUB_TOKEN secret" >&2
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Deno
        uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install skills-ref tool
        run: uv tool install git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref

      - name: Validate skill with skills-ref
        run: skills-ref validate "${{ steps.publish.outputs.skill_path }}"

      - name: Validate skills with skill-check
        run: npx skill-check check --no-security-scan skills

      - name: Check generated docs
        run: |
          npm run docs
          git diff --exit-code

      - name: Smoke test skill scripts
        shell: bash
        run: |
          set -euo pipefail
          skill_source="${{ steps.publish.outputs.skill_path }}"

          if [ -d "${skill_source}/scripts" ]; then
            while IFS= read -r -d '' file; do
              node --check "${file}"
            done < <(find "${skill_source}/scripts" -type f -name '*.mjs' -print0)
          fi

      - name: Install ClawHub CLI
        run: npm install --global clawhub@0.9.0

      - name: Authenticate with ClawHub
        env:
          CLAWHUB_CONFIG_PATH: ${{ runner.temp }}/clawhub-config.json
          CLAWHUB_SITE: https://clawhub.ai
          CLAWHUB_REGISTRY: https://clawhub.ai
        run: clawhub login --token "${CLAWHUB_TOKEN}" --no-input

      - name: Publish skill to ClawHub
        env:
          CLAWHUB_CONFIG_PATH: ${{ runner.temp }}/clawhub-config.json
          CLAWHUB_SITE: https://clawhub.ai
          CLAWHUB_REGISTRY: https://clawhub.ai
          CLAWHUB_TAGS: ${{ steps.publish.outputs.clawhub_tags }}
          SKILL_PATH: ${{ steps.publish.outputs.skill_path }}
          SKILL_VERSION: ${{ steps.publish.outputs.version }}
        run: |
          clawhub publish "${SKILL_PATH}" \
            --version "${SKILL_VERSION}" \
            --tags "${CLAWHUB_TAGS}" \
            --no-input
