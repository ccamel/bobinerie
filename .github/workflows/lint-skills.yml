name: Lint Agent Skills

on:
  workflow_call:
  push:
    branches: [main]
    paths:
      - ".agents/skills/**"
      - "skills/**"
  pull_request:
    branches: [main]
    paths:
      - ".agents/skills/**"
      - "skills/**"

concurrency:
  group: lint-skills-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-skills:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        source:
          - .agents/skills
          - skills
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4

      - name: Install skills-ref tool
        run: |
          uv tool install git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref

      - name: Validate skills with skills-ref
        run: |
          for dir in ${{ matrix.source }}/*/ ; do
            skills-ref validate "$dir"
          done

      - name: Validate skills with skill-check
        run: npx skill-check check --no-security-scan ${{ matrix.source }}
